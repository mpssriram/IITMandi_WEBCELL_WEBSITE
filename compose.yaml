services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-DevCell}
      MYSQL_USER: ${MYSQL_USER:-devcell}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Backend_user/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Dev Website}
      HOST: 0.0.0.0
      PORT: 8765
      DEBUG: "false"
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-devcell}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-DevCell}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      ADMIN_UIDS: ${ADMIN_UIDS:-}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      GUNICORN_GRACEFUL_TIMEOUT: ${GUNICORN_GRACEFUL_TIMEOUT:-30}
      GUNICORN_KEEPALIVE: ${GUNICORN_KEEPALIVE:-5}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT:-90}
      DB_WAIT_INTERVAL: ${DB_WAIT_INTERVAL:-2}
      UPLOAD_FOLDER: /app/uploads
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-adminsdk.json
    volumes:
      - backend_uploads:/app/uploads
      - type: bind
        source: ${FIREBASE_SERVICE_ACCOUNT_HOST_PATH:?FIREBASE_SERVICE_ACCOUNT_HOST_PATH is required}
        target: /run/secrets/firebase-adminsdk.json
        read_only: true
    healthcheck:
      test: ["CMD", "python", "/app/Backend_user/docker/healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - ${WEB_PORT:-8080}:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mysql_data:
  backend_uploads:
